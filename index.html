<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Zombie Hunter LEGEND</title>
<style>
body{margin:0;overflow:hidden;background:black;}
#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:22px;
font-family:Arial;
}
#skill{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
}
button{font-size:22px;margin:5px;}
</style>
</head>
<body>
<div id="ui"></div>
<div id="skill">
<button onclick="freeze()">冰冻技能</button>
</div>
<script>

let c=document.getElementById("c")
let ctx=c.getContext("2d")
c.width=innerWidth
c.height=innerHeight

let level=Number(localStorage.getItem("level"))||1
let player={x:c.width/2,y:c.height-100,hp:100}
let zombies=[]
let bullets=[]
let effects=[]
let score=0
let spawnLeft=level*20
let fireRate=300
let freezeCD=0
let revived=false
let game=true

function spawn(){
if(!game)return
if(spawnLeft<=0)return

let boss=Math.random()<0.2

zombies.push({
x:Math.random()*c.width,
y:-60,
speed: boss?1.2+level*0.1:2+level*0.1,
hp: boss?6+level:1,
size: boss?80:40,
frozen:0
})

spawnLeft--

setTimeout(spawn,700)
}
spawn()

setInterval(()=>{
bullets.push({x:player.x,y:player.y})
},fireRate)

document.addEventListener("touchmove",e=>{
player.x=e.touches[0].clientX
})

function freeze(){
if(freezeCD>0)return
freezeCD=600
zombies.forEach(z=>z.frozen=200)
}

function loop(){

ctx.fillStyle="#000"
ctx.fillRect(0,0,c.width,c.height)

ctx.fillStyle="cyan"
ctx.fillRect(player.x-25,player.y-25,50,50)

bullets.forEach((b,bi)=>{
b.y-=12
ctx.fillStyle="yellow"
ctx.fillRect(b.x-3,b.y-10,6,12)
if(b.y<0)bullets.splice(bi,1)
})

zombies.forEach((z,zi)=>{

if(z.frozen>0){
z.frozen--
ctx.fillStyle="lightblue"
}else{
let dx=player.x-z.x
z.x+=dx*0.02
z.y+=z.speed
ctx.fillStyle=z.hp>1?"purple":"green"
}

ctx.fillRect(z.x-z.size/2,z.y-z.size/2,z.size,z.size)

if(Math.abs(z.x-player.x)<45 && Math.abs(z.y-player.y)<45){
player.hp-=1
if(player.hp<=0){
if(!revived){
revived=true
player.hp=60
alert("复活成功")
}else{
alert("GAME OVER")
location.reload()
}
}
}

bullets.forEach((b,bi)=>{
if(Math.abs(b.x-z.x)<z.size/2 && Math.abs(b.y-z.y)<z.size/2){
z.hp--
bullets.splice(bi,1)
if(z.hp<=0){
effects.push({x:z.x,y:z.y,life:40})
zombies.splice(zi,1)
score++
}
}
})
})

effects.forEach((e,ei)=>{
ctx.fillStyle="orange"
ctx.beginPath()
ctx.arc(e.x,e.y,60-e.life,0,Math.PI*2)
ctx.fill()
e.life--
if(e.life<=0)effects.splice(ei,1)
})

if(spawnLeft<=0 && zombies.length==0){
level++
localStorage.setItem("level",level)
alert("胜利！进入第"+level+"关")
location.reload()
}

if(freezeCD>0)freezeCD--

document.getElementById("ui").innerHTML=
"Level:"+level+
"<br>Score:"+score+
"<br>HP:"+player.hp+
"<br>SkillCD:"+Math.floor(freezeCD/60)

requestAnimationFrame(loop)
}
loop()

</script>
</body>
</
